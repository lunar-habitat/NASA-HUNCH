<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Habitat — 3D Wristband Explorer</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        /* ===== Full-bleed 3D canvas ===== */
        body {
            overflow: hidden;
            background-image: none;
        }

        #wristband-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ===== HUD Overlay ===== */
        #hud-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        #hud-overlay > * {
            pointer-events: auto;
        }

        /* ===== Top-left controls ===== */
        .hud-top-left {
            position: absolute;
            top: var(--space-lg);
            left: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .hud-panel {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md) var(--space-lg);
            box-shadow: var(--shadow-card);
        }

        .hud-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-accent);
            margin-bottom: var(--space-xs);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .hud-title svg {
            flex-shrink: 0;
        }

        .hud-subtitle {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-bottom: var(--space-md);
        }

        .hud-row {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
        }

        .hud-row:last-child {
            margin-bottom: 0;
        }

        .hud-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            min-width: 60px;
        }

        .hud-back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            color: var(--color-text-accent);
            text-decoration: none;
            font-size: var(--font-size-sm);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .hud-back-link:hover,
        .hud-back-link:focus-visible {
            background: var(--color-accent-glow);
            outline: none;
        }

        /* ===== Sensor info panel (right side) ===== */
        .sensor-panel {
            position: absolute;
            top: var(--space-lg);
            right: var(--space-lg);
            width: 280px;
            transform: translateX(320px);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sensor-panel.visible {
            transform: translateX(0);
        }

        .sensor-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
        }

        .sensor-panel-title {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--color-text-accent);
        }

        .sensor-panel-close {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: var(--font-size-lg);
            padding: var(--space-xs);
            border-radius: var(--radius-sm);
            line-height: 1;
        }

        .sensor-panel-close:hover {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .sensor-panel-body .sensor-detail-row {
            display: flex;
            justify-content: space-between;
            padding: var(--space-xs) 0;
            border-bottom: 1px solid rgba(42, 58, 92, 0.4);
            font-size: var(--font-size-sm);
        }

        .sensor-detail-label {
            color: var(--color-text-secondary);
        }

        .sensor-detail-value {
            color: var(--color-text-primary);
            font-family: var(--font-mono);
        }

        .sensor-description {
            margin-top: var(--space-sm);
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        /* ===== Wellbeing badge (bottom center) ===== */
        .hud-bottom-center {
            position: absolute;
            bottom: var(--space-lg);
            left: 50%;
            transform: translateX(-50%);
        }

        .wellbeing-badge {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-lg);
        }

        .wellbeing-badge .wb-ring {
            flex-shrink: 0;
        }

        .wellbeing-badge .wb-info {
            display: flex;
            flex-direction: column;
        }

        .wb-info-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .wb-info-status {
            font-size: var(--font-size-sm);
            font-weight: 600;
        }

        .wb-info-status.green  { color: var(--color-success); }
        .wb-info-status.yellow { color: var(--color-warning); }
        .wb-info-status.red    { color: var(--color-danger); }

        /* ===== Interaction hint ===== */
        .hud-hint {
            position: absolute;
            bottom: var(--space-lg);
            left: var(--space-lg);
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            opacity: 0.6;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .hud-top-left {
                top: var(--space-sm);
                left: var(--space-sm);
            }

            .sensor-panel {
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                transform: translateY(100%);
            }

            .sensor-panel.visible {
                transform: translateY(0);
            }

            .hud-bottom-center {
                bottom: var(--space-sm);
            }

            .hud-hint {
                display: none;
            }
        }
    </style>
</head>
<body class="dark-theme">

    <canvas id="wristband-canvas"></canvas>

    <div id="hud-overlay">
        <!-- Top-left: branding + controls -->
        <div class="hud-top-left">
            <div class="hud-panel">
                <div class="hud-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5" stroke="var(--color-accent)" stroke-width="1.5" fill="var(--color-accent-glow)" />
                    </svg>
                    3D Wristband Explorer
                </div>
                <div class="hud-subtitle">Lunar Habitat Crew Wellbeing Monitor</div>

                <div class="hud-row">
                    <label for="scenario-select-3d" class="hud-label">Scenario</label>
                    <select id="scenario-select-3d" class="control-select">
                        <option value="baseline">Baseline</option>
                        <option value="stress">Stress Spike</option>
                        <option value="sleepDeprived">Sleep Deprived</option>
                        <option value="exercise">High Activity</option>
                        <option value="eva">EVA Spacewalk</option>
                        <option value="microgravity">Microgravity Rest</option>
                        <option value="emergency">Emergency Alert</option>
                        <option value="isolation">Social Isolation</option>
                    </select>
                </div>

                <a href="index.html" class="hud-back-link">← Dashboard</a>
                <a href="wristband-product.html" class="hud-back-link">🎨 Product View</a>
            </div>
        </div>

        <!-- Right: Sensor info panel (hidden by default) -->
        <div id="sensor-panel" class="sensor-panel hud-panel">
            <div class="sensor-panel-header">
                <span class="sensor-panel-title" id="sensor-panel-title">Sensor</span>
                <button class="sensor-panel-close" id="sensor-panel-close" aria-label="Close sensor panel">✕</button>
            </div>
            <div class="sensor-panel-body" id="sensor-panel-body">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- Bottom center: Wellbeing badge -->
        <div class="hud-bottom-center">
            <div class="hud-panel wellbeing-badge" id="wellbeing-badge">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- Bottom left hint -->
        <div class="hud-hint">Click + drag to rotate · Scroll to zoom · Click sensors to inspect</div>
    </div>

    <div id="a11y-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="scripts/wristband-3d.js"></script>
</body>
</html>
