<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Habitat — 3D Wristband Explorer</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/wristband-3d.css">
</head>
<body class="dark-theme">

    <canvas id="wristband-canvas"></canvas>

    <div id="hud-overlay">
        <!-- Top-left: branding + controls -->
        <div class="hud-top-left">
            <div class="hud-panel">
                <div class="hud-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5" stroke="var(--color-accent)" stroke-width="1.5" fill="var(--color-accent-glow)" />
                    </svg>
                    3D Wristband Explorer
                </div>
                <div class="hud-subtitle">Lunar Habitat Crew Wellbeing Monitor</div>

                <div class="hud-row">
                    <label for="scenario-select-3d" class="hud-label">Scenario</label>
                    <select id="scenario-select-3d" class="control-select">
                        <option value="baseline">Baseline</option>
                        <option value="stress">Stress Spike</option>
                        <option value="sleepDeprived">Sleep Deprived</option>
                        <option value="exercise">High Activity</option>
                        <option value="emergency">Emergency Alert</option>
                        <option value="isolation">Social Isolation</option>
                    </select>
                </div>

                <a href="../index.html" class="hud-back-link">← Dashboard</a>
                <a href="habitat-3d.html" class="hud-back-link"><svg class="icon icon--sm" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Habitat 3D</a>
                <a href="wristband-product.html" class="hud-back-link"><svg class="icon icon--sm" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg> Product View</a>
            </div>
        </div>

        <!-- Right: Sensor info panel (hidden by default) -->
        <div id="sensor-panel" class="sensor-panel hud-panel">
            <div class="sensor-panel-header">
                <span class="sensor-panel-title" id="sensor-panel-title">Sensor</span>
                <button class="sensor-panel-close" id="sensor-panel-close" aria-label="Close sensor panel"><svg class="icon icon--sm" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="sensor-panel-body" id="sensor-panel-body">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- Bottom center: Wellbeing badge -->
        <div class="hud-bottom-center">
            <div class="hud-panel wellbeing-badge" id="wellbeing-badge">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- Bottom left hint -->
        <div class="hud-hint">Click + drag to rotate · Scroll to zoom · Click sensors to inspect</div>
    </div>

    <div id="a11y-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="../scripts/wristband-3d.js"></script>
</body>
</html>
