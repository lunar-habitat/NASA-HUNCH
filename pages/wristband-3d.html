<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Habitat — 3D Wristband Explorer</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/wristband-3d.css">
</head>
<body class="dark-theme">

    <canvas id="wristband-canvas"></canvas>

    <div id="hud-overlay">
        <!-- Top-left: branding + controls -->
        <div class="hud-top-left">
            <div class="hud-panel">
                <div class="hud-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5" stroke="var(--color-accent)" stroke-width="1.5" fill="var(--color-accent-glow)" />
                    </svg>
                    3D Wristband Explorer
                </div>
                <div class="hud-subtitle">Lunar Habitat Crew Wellbeing Monitor</div>

                <div class="hud-row">
                    <label for="scenario-select-3d" class="hud-label">Scenario</label>
                    <select id="scenario-select-3d" class="control-select">
                        <option value="baseline">Baseline</option>
                        <option value="stress">Stress Spike</option>
                        <option value="sleepDeprived">Sleep Deprived</option>
                        <option value="exercise">High Activity</option>
                        <option value="eva">EVA Spacewalk</option>
                        <option value="microgravity">Microgravity Rest</option>
                        <option value="emergency">Emergency Alert</option>
                        <option value="isolation">Social Isolation</option>
                    </select>
                </div>

                <a href="../index.html" class="hud-back-link">← Dashboard</a>
                <a href="habitat-3d.html" class="hud-back-link">🏘 Habitat 3D</a>
                <a href="wristband-product.html" class="hud-back-link">🎨 Product View</a>
            </div>
        </div>

        <!-- Right: Sensor info panel (hidden by default) -->
        <div id="sensor-panel" class="sensor-panel hud-panel">
            <div class="sensor-panel-header">
                <span class="sensor-panel-title" id="sensor-panel-title">Sensor</span>
                <button class="sensor-panel-close" id="sensor-panel-close" aria-label="Close sensor panel">✕</button>
            </div>
            <div class="sensor-panel-body" id="sensor-panel-body">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- Bottom center: Wellbeing badge -->
        <div class="hud-bottom-center">
            <div class="hud-panel wellbeing-badge" id="wellbeing-badge">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- Bottom left hint -->
        <div class="hud-hint">Click + drag to rotate · Scroll to zoom · Click sensors to inspect</div>
    </div>

    <div id="a11y-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="../scripts/wristband-3d.js"></script>
</body>
</html>
