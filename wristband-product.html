<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Habitat — Product View</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body {
            overflow: hidden;
            background: #0a0e17;
            background-image: none;
        }

        #product-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ===== HUD Overlay ===== */
        #hud-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        #hud-overlay > * {
            pointer-events: auto;
        }

        /* Top-left panel */
        .hud-top-left {
            position: absolute;
            top: var(--space-lg);
            left: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .hud-panel {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(42, 58, 92, 0.5);
            border-radius: var(--radius-lg);
            padding: var(--space-md) var(--space-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .hud-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .hud-subtitle {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            margin-bottom: var(--space-md);
        }

        .hud-row {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
        }

        .hud-row:last-child { margin-bottom: 0; }

        .hud-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            min-width: 60px;
        }

        .hud-links {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }

        .hud-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            color: var(--color-text-accent);
            text-decoration: none;
            font-size: var(--font-size-sm);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .hud-link:hover,
        .hud-link:focus-visible {
            background: var(--color-accent-glow);
            outline: none;
        }

        /* Top-right: auto-rotate toggle */
        .hud-top-right {
            position: absolute;
            top: var(--space-lg);
            right: var(--space-lg);
        }

        .toggle-btn {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(42, 58, 92, 0.5);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: var(--font-size-sm);
            font-family: var(--font-family);
            transition: color 0.2s, border-color 0.2s;
        }

        .toggle-btn:hover { color: var(--color-text-primary); }

        .toggle-btn.active {
            color: var(--color-text-accent);
            border-color: var(--color-accent);
        }

        /* Bottom-center: variant picker */
        .hud-bottom-center {
            position: absolute;
            bottom: var(--space-xl);
            left: 50%;
            transform: translateX(-50%);
        }

        .variant-picker {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-lg);
        }

        .variant-picker-label {
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: var(--space-xs);
        }

        .variant-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .variant-swatch:hover {
            transform: scale(1.15);
        }

        .variant-swatch.active {
            border-color: var(--color-text-primary);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
        }

        .variant-swatch::after {
            content: attr(data-name);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--color-text-secondary);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .variant-swatch:hover::after {
            opacity: 1;
        }

        /* Bottom-left hint */
        .hud-hint {
            position: absolute;
            bottom: var(--space-lg);
            left: var(--space-lg);
            font-size: var(--font-size-xs);
            color: var(--color-text-secondary);
            opacity: 0.5;
            transition: opacity 1s;
        }

        .hud-hint.hidden { opacity: 0; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0e17;
            transition: opacity 0.6s;
        }

        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(56, 189, 248, 0.15);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: var(--space-md);
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hud-top-left { top: var(--space-sm); left: var(--space-sm); }
            .hud-top-right { top: var(--space-sm); right: var(--space-sm); }
            .hud-bottom-center { bottom: var(--space-sm); }
            .hud-hint { display: none; }
            .variant-swatch { width: 28px; height: 28px; }
        }
    </style>
</head>
<body class="dark-theme">

    <!-- Loading overlay (while HDR loads) -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner-ring"></div>
        <p class="loading-text">Loading environment…</p>
    </div>

    <canvas id="product-canvas"></canvas>

    <div id="hud-overlay">
        <!-- Top-left: branding + controls -->
        <div class="hud-top-left">
            <div class="hud-panel">
                <div class="hud-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5" stroke="var(--color-accent)" stroke-width="1.5" fill="var(--color-accent-glow)" />
                    </svg>
                    Product View
                </div>
                <div class="hud-subtitle">Lunar Habitat Wristband — Concept Render</div>

                <div class="hud-row">
                    <label for="scenario-select-product" class="hud-label">Scenario</label>
                    <select id="scenario-select-product" class="control-select">
                        <option value="baseline">Baseline</option>
                        <option value="stress">Stress Spike</option>
                        <option value="sleepDeprived">Sleep Deprived</option>
                        <option value="exercise">High Activity</option>
                        <option value="eva">EVA Spacewalk</option>
                        <option value="microgravity">Microgravity Rest</option>
                        <option value="emergency">Emergency Alert</option>
                        <option value="isolation">Social Isolation</option>
                    </select>
                </div>

                <div class="hud-links">
                    <a href="index.html" class="hud-link">← Dashboard</a>
                    <a href="wristband-3d.html" class="hud-link">🧊 Sci-Fi View</a>
                </div>
            </div>
        </div>

        <!-- Top-right: auto-rotate toggle -->
        <div class="hud-top-right">
            <button id="btn-auto-rotate" class="toggle-btn active" title="Toggle auto-rotate">⟳ Auto-Rotate</button>
        </div>

        <!-- Bottom-center: color variant picker -->
        <div class="hud-bottom-center">
            <div class="hud-panel variant-picker">
                <span class="variant-picker-label">Finish</span>
                <button class="variant-swatch active" data-variant="spaceGray" data-name="Space Gray" style="background: #3a3a3c;" aria-label="Space Gray"></button>
                <button class="variant-swatch" data-variant="silver" data-name="Silver" style="background: linear-gradient(135deg, #e8e8ed, #c7c7cc);" aria-label="Silver"></button>
                <button class="variant-swatch" data-variant="midnight" data-name="Midnight" style="background: #1c1c1e;" aria-label="Midnight"></button>
                <button class="variant-swatch" data-variant="starlight" data-name="Starlight" style="background: linear-gradient(135deg, #faf6f2, #e8dfd6);" aria-label="Starlight"></button>
            </div>
        </div>

        <!-- Bottom-left hint -->
        <div class="hud-hint" id="hud-hint">Click + drag to rotate · Scroll to zoom</div>
    </div>

    <div id="a11y-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="scripts/wristband-product.js"></script>
</body>
</html>
